<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenSense Wi-Fi Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <h1>Green<span>Sense</span></h1>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="text" id="esp-ip" value="192.168.1.100" style="padding: 8px 12px; border-radius: 20px; border: 1px solid #2e7559; background: #f4f7f5; font-weight: 600; text-align: center; width: 130px;">
                
                <div class="bt-status" id="net-button" onclick="connectWiFi()">
                    <i class="fa-solid fa-wifi"></i> <span id="net-text">Connect ESP</span>
                </div>
                <button id="sim-button" onclick="startDataSimulation()" style="background: #2e7559; color: white; padding: 8px 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s;">
                    🚀 Start Sim
                </button>
            </div>
        </header>

        <div class="main-content">
            <div class="status-panel">
                <div class="card">
                    <div class="health-score-circle">
                        <div class="health-inner">
                            <h2 id="health-score">85</h2>
                            <p>Score</p>
                        </div>
                    </div>
                    <h3 id="mode-title">Standard Mode</h3>
                    
                    <div class="camera-container" onclick="startCamera()">
                        <video id="webcam" autoplay playsinline muted></video>
                        <div class="camera-placeholder" id="placeholder">
                            <i class="fa-solid fa-camera"></i>
                            <span style="font-weight: 600;">AI Plant Scanner</span>
                            <p style="font-size: 12px; color: #708075; margin-top: 5px;">Click to scan plant</p>
                        </div>
                    </div>
                    <div id="ai-result">AI Status: Ready</div>
                </div>
            </div>

            <div class="sensors-grid">
                <div class="sensor-card temp">
                    <div class="icon-wrapper"><i class="fa-solid fa-temperature-high"></i></div>
                    <div class="sensor-info"><p>Air Temp</p><h3 id="val-temp">--.- °C</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card humidity">
                    <div class="icon-wrapper"><i class="fa-solid fa-droplet"></i></div>
                    <div class="sensor-info"><p>Air Humidity</p><h3 id="val-hum">-- %</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card soil">
                    <div class="icon-wrapper"><i class="fa-solid fa-seedling"></i></div>
                    <div class="sensor-info"><p>Soil Moisture</p><h3 id="val-soil">-- %</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card light">
                    <div class="icon-wrapper"><i class="fa-solid fa-sun"></i></div>
                    <div class="sensor-info"><p>Light Level</p><h3 id="val-light">-- Lux</h3><span class="status-badge">Normal</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let model = undefined;
        let ws = null;

        // 1. Load Teachable Machine
        async function loadAI() {
            document.getElementById('ai-result').innerText = "Loading GreenSense AI...";
            try {
                model = await tmImage.load('./model.json', './metadata.json');
                document.getElementById('ai-result').innerText = "GreenSense AI Ready";
            } catch (e) {
                console.error(e);
                document.getElementById('ai-result').innerText = "Error loading local files.";
            }
        }
        loadAI();

        // 2. Start Camera feed
        async function startCamera() {
            const video = document.getElementById('webcam');
            const placeholder = document.getElementById('placeholder');
            const resultDiv = document.getElementById('ai-result');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                placeholder.style.display = 'none';
                video.style.display = 'block';

                setInterval(async () => {
                    if (model) {
                        const prediction = await model.predict(video);
                        prediction.sort((a, b) => b.probability - a.probability);
                        const topResult = prediction[0];
                        if (topResult.probability < 0.60) return;

                        let detectedLabel = topResult.className;
                        resultDiv.innerText = `Detected: ${detectedLabel} (${Math.round(topResult.probability * 100)}%)`;
                        
                        if (detectedLabel === "tomato") {
                            document.getElementById('mode-title').innerText = "Tomato Mode Active";
                            document.getElementById('health-score').innerText = "96";
                        } else if (detectedLabel === "strawbarry") {
                            document.getElementById('mode-title').innerText = "Strawberry Mode Active";
                            document.getElementById('health-score').innerText = "92";
                        } else if (detectedLabel === "empty pot") {
                            document.getElementById('mode-title').innerText = "Greenhouse: Empty Station";
                            document.getElementById('health-score').innerText = "--";
                        }
                    }
                }, 1000);
            } catch (err) {
                resultDiv.innerText = "Camera Access Error";
            }
        }

        // 3. Simulated testing option
        function startDataSimulation() {
            document.getElementById('net-text').innerText = "Simulating...";
            document.getElementById('net-button').classList.add('connected');
            setInterval(() => {
                document.getElementById('val-temp').innerText = `${(23 + Math.random() * 4).toFixed(1)} °C`;
                document.getElementById('val-hum').innerText = `${Math.floor(60 + Math.random() * 10)} %`;
                document.getElementById('val-soil').innerText = `${Math.floor(45 + Math.random() * 15)} %`;
                document.getElementById('val-light').innerText = `${Math.floor(700 + Math.random() * 150)} Lux`;
            }, 1500);
        }

        // 4. Wi-Fi WebSocket Connection Logic
        function connectWiFi() {
            const ipAddress = document.getElementById('esp-ip').value.trim();
            const netButton = document.getElementById('net-button');
            const netText = document.getElementById('net-text');

            netText.innerText = "Connecting...";

            // Create a native browser WebSocket client directed at your ESP on Port 81
            ws = new WebSocket(`ws://${ipAddress}:81`);

            ws.onopen = () => {
                netButton.classList.add('connected');
                netText.innerText = "Connected";
                console.log("WebSocket connected to ESP32!");
            };

            ws.onmessage = (event) => {
                // Read the incoming text directly (no textDecoder array extraction needed!)
                const value = event.data;
                console.log("Packet via Wi-Fi Received:", value);
                document.getElementById('ai-result').innerText = `Wi-Fi Received: ${value}`;

                // Parse standard sensor token layouts ("T:x,H:y...")
                const parts = value.split(',');
                parts.forEach(part => {
                    const kv = part.split(':');
                    if(kv[0] === 'T') document.getElementById('val-temp').innerText = `${kv[1]} °C`;
                    if(kv[0] === 'H') document.getElementById('val-hum').innerText = `${kv[1]} %`;
                    if(kv[0] === 'S') document.getElementById('val-soil').innerText = `${kv[1]} %`;
                    if(kv[0] === 'L') document.getElementById('val-light').innerText = `${kv[1]} Lux`;
                });
            };

            ws.onclose = () => {
                netButton.classList.remove('connected');
                netText.innerText = "Connect ESP";
                console.log("WebSocket disconnected.");
            };

            ws.onerror = (error) => {
                console.error("WebSocket Error: ", error);
                netText.innerText = "Error Connecting";
            };
        }
    </script>
</body>
</html>
