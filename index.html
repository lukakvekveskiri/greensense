<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenSense Smart Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <h1>Green<span>Sense</span></h1>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="bt-status" id="bt-button" onclick="connectBluetooth()">
                    <i class="fa-solid fa-bluetooth"></i> <span id="bt-text">Connect HM-10</span>
                </div>
                <button id="sim-button" onclick="startDataSimulation()" style="background: #2e7559; color: white; padding: 8px 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s;">
                    🚀 Start Sim
                </button>
            </div>
        </header>

        <div class="main-content">
            <div class="status-panel">
                <div class="card">
                    <div class="health-score-circle">
                        <div class="health-inner">
                            <h2 id="health-score">85</h2>
                            <p>Score</p>
                        </div>
                    </div>
                    <h3 id="mode-title">Standard Mode</h3>
                    
                    <div class="camera-container" onclick="startCamera()">
                        <video id="webcam" autoplay playsinline muted></video>
                        <div class="camera-placeholder" id="placeholder">
                            <i class="fa-solid fa-camera"></i>
                            <span style="font-weight: 600;">AI Plant Scanner</span>
                            <p style="font-size: 12px; color: #708075; margin-top: 5px;">Click to scan plant</p>
                        </div>
                    </div>
                    <div id="ai-result">AI Status: Ready</div>
                </div>
            </div>

            <div class="sensors-grid">
                <div class="sensor-card temp">
                    <div class="icon-wrapper"><i class="fa-solid fa-temperature-high"></i></div>
                    <div class="sensor-info"><p>Air Temp</p><h3 id="val-temp">--.- °C</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card humidity">
                    <div class="icon-wrapper"><i class="fa-solid fa-droplet"></i></div>
                    <div class="sensor-info"><p>Air Humidity</p><h3 id="val-hum">-- %</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card soil">
                    <div class="icon-wrapper"><i class="fa-solid fa-seedling"></i></div>
                    <div class="sensor-info"><p>Soil Moisture</p><h3 id="val-soil">-- %</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card light">
                    <div class="icon-wrapper"><i class="fa-solid fa-sun"></i></div>
                    <div class="sensor-info"><p>Light Level</p><h3 id="val-light">-- Lux</h3><span class="status-badge">Normal</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let model = undefined;
        let bluetoothDevice = null;
        let rxCharacteristic = null;

        // 1. Automatically load your local custom Teachable Machine model files
        async function loadAI() {
            document.getElementById('ai-result').innerText = "Loading GreenSense AI...";
            try {
                const modelURL = './model.json';
                const metadataURL = './metadata.json';
                
                model = await tmImage.load(modelURL, metadataURL);
                document.getElementById('ai-result').innerText = "GreenSense AI Ready";
            } catch (e) {
                console.error("Failed to load local model files:", e);
                document.getElementById('ai-result').innerText = "Error loading local files.";
            }
        }
        loadAI();

        // 2. Start Camera feed and process custom plant predictions continuously
        async function startCamera() {
            const video = document.getElementById('webcam');
            const placeholder = document.getElementById('placeholder');
            const resultDiv = document.getElementById('ai-result');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                placeholder.style.display = 'none';
                video.style.display = 'block';
                resultDiv.innerText = "Scanning environment...";

                // Predict every 1 second while camera frame matrix is active
                setInterval(async () => {
                    if (model) {
                        const prediction = await model.predict(video);
                        
                        // Sort predictions to find the highest match score
                        prediction.sort((a, b) => b.probability - a.probability);
                        const topResult = prediction[0];

                        // Keep scanning if confidence is too low (< 60%)
                        if (topResult.probability < 0.60) {
                            resultDiv.innerText = "Analyzing surroundings...";
                            return;
                        }

                        let detectedLabel = topResult.className;
                        resultDiv.innerText = `Detected: ${detectedLabel} (${Math.round(topResult.probability * 100)}%)`;
                        
                        // Update UI depending on which trained class is spotted
                        if (detectedLabel === "tomato") {
                            document.getElementById('mode-title').innerText = "Tomato Mode Active";
                            document.getElementById('health-score').innerText = "96";
                        } else if (detectedLabel === "strawbarry") {
                            document.getElementById('mode-title').innerText = "Strawberry Mode Active";
                            document.getElementById('health-score').innerText = "92";
                        } else if (detectedLabel === "empty pot") {
                            document.getElementById('mode-title').innerText = "Greenhouse: Empty Station";
                            document.getElementById('health-score').innerText = "--";
                        }
                    }
                }, 1000);

            } catch (err) {
                console.error("Camera access error:", err);
                resultDiv.innerText = "Camera Access Error";
            }
        }

        // 3. Direct Interface Testing Simulator (Bypasses active Bluetooth hardware checks)
       function startDataSimulation() {
    // 1. Visually update the UI state
    document.getElementById('sim-button').innerText = "🤖 Bluetooth Mock Active";
    document.getElementById('sim-button').style.backgroundColor = "#1d533d";
    console.log("Mocking Bluetooth device discovery...");

    // 2. Override the browser's requestDevice function entirely
    navigator.bluetooth.requestDevice = async function(options) {
        console.log("Intercepted requestDevice() with configuration filters:", options);
        
        // Return a mock device object that mimics the exact properties of an HM-10 module
        return {
            name: 'HM-10 Simulated',
            id: 'mock-ble-device-id',
            gatt: {
                connect: async function() {
                    console.log("Mocking GATT server connection layer...");
                    return {
                        getPrimaryService: async function(serviceUuid) {
                            console.log("Mocking primary service discovery for UUID:", serviceUuid);
                            return {
                                getCharacteristic: async function(charUuid) {
                                    console.log("Mocking characteristic setup for UUID:", charUuid);
                                    
                                    // Create an event target structure to trigger notifications later
                                    const mockCharacteristic = new EventTarget();
                                    
                                    // Add the required startNotifications method
                                    mockCharacteristic.startNotifications = async function() {
                                        console.log("Mock notifications active! Commencing data streaming loop...");
                                        
                                        // Fire simulated data packets down the pipeline every 1.5 seconds
                                        setInterval(() => {
                                            const temp = (22 + Math.random() * 5).toFixed(1);
                                            const hum = Math.floor(55 + Math.random() * 15);
                                            const soil = Math.floor(40 + Math.random() * 20);
                                            const light = Math.floor(600 + Math.random() * 200);
                                            
                                            const packet = `T:${temp},H:${hum},S:${soil},L:${light}`;
                                            console.log("↳ Incoming Simulated BLE Packet:", packet);

                                            // Construct a fake data event payload
                                            const event = new Event('characteristicvaluechanged');
                                            event.target = {
                                                value: {
                                                    buffer: new TextEncoder().encode(packet).buffer
                                                }
                                            };
                                            
                                            // Dispatch it straight into your real handleDataReceived function
                                            mockCharacteristic.dispatchEvent(event);
                                        }, 1500);
                                        return this;
                                    };
                                    return mockCharacteristic;
                                }
                            };
                        }
                    };
                }
            }
        };
    };

    alert("Bluetooth Mock Ready! Now click the normal 'Connect HM-10' button to test the sequence.");
}

        // 4. Physical Bluetooth connectivity (Web Bluetooth API)
        async function connectBluetooth() {
            const btButton = document.getElementById('bt-button');
            const btText = document.getElementById('bt-text');
            try {
                btText.innerText = "Searching...";
                bluetoothDevice = await navigator.bluetooth.requestDevice({
    acceptAllDevices: true, // Bypasses name and prefix checks entirely
    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] // Keeps our custom lane open
});
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                rxCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                await rxCharacteristic.startNotifications();
                rxCharacteristic.addEventListener('characteristicvaluechanged', handleDataReceived);
                btButton.classList.add('connected');
                btText.innerText = "Connected";
            } catch (error) {
                console.error("Web Bluetooth error:", error);
                btText.innerText = "Connect HM-10";
            }
        }

        // Parse standard text strings incoming from your microcontroller string packet
        function handleDataReceived(event) {
            const value = new TextDecoder().decode(event.target.value);
            const parts = value.split(',');
            parts.forEach(part => {
                const kv = part.split(':');
                if(kv[0] === 'T') document.getElementById('val-temp').innerText = `${kv[1]} °C`;
                if(kv[0] === 'H') document.getElementById('val-hum').innerText = `${kv[1]} %`;
                if(kv[0] === 'S') document.getElementById('val-soil').innerText = `${kv[1]} %`;
                if(kv[0] === 'L') document.getElementById('val-light').innerText = `${kv[1]} Lux`;
            });
        }
    </script>
</body>
</html>
