<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GreenSense AI - Smart Agro Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-badge">🌱 AI</div>
            <h1>GreenSense</h1>
            <p class="subtitle">Premium Greenhouse Diagnostic Engine</p>
        </header>
        
        <main>
            <div class="form-group">
                <label for="plantName">🌿 Plant Variety</label>
                <input type="text" id="plantName" placeholder="e.g., Hazelnut, Mocvi, Saperavi" autocomplete="off">
            </div>

            <div class="input-grid">
                <div class="form-group">
                    <label for="temperature">🌡️ Temp (°C)</label>
                    <input type="number" id="temperature" placeholder="24" inputmode="decimal">
                </div>

                <div class="form-group">
                    <label for="humidity">💧 Soil Moisture (%)</label>
                    <input type="number" id="humidity" placeholder="55" inputmode="numeric">
                </div>
            </div>

            <button id="analyzeBtn" class="interactive-btn">Analyze Environment</button>

            <div id="resultCard" class="result-card hidden">
                <div class="gauge-wrapper">
                    <div class="gauge-body">
                        <div class="gauge-fill" id="gaugeFill"></div>
                        <div class="gauge-cover"><span id="scoreValue">0</span>%</div>
                    </div>
                </div>
                <p id="aiAdvice"></p>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
