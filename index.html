<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse HM-10 Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Greenhouse Control</h1>
    <div id="statusText" class="status">Disconnected</div>
    
    <button class="btn-connect" id="connectBtn" onclick="connectBluetooth()">🔌 Connect to HM-10</button>
    <hr>
    
    <button class="btn-on" onclick="sendCommand('LIGHT_ON')">💡 Turn Lights ON</button>
    <button class="btn-off" onclick="sendCommand('LIGHT_OFF')">🔌 Turn Lights OFF</button>
</div>

<script>
    let bluetoothDevice = null;
    let rxTxCharacteristic = null;

    // Factory default 16-bit UUIDs for the TI CC2541 HM-10 module
    const HM10_SERVICE_UUID = 0xffe0; 
    const HM10_CHARACTERISTIC_UUID = 0xffe1;

    async function connectBluetooth() {
        const statusText = document.getElementById('statusText');
        const connectBtn = document.getElementById('connectBtn');
        
        try {
            statusText.innerText = "Searching for HM-10...";
            
            // Filters for the standard HM-10 service profile
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [HM10_SERVICE_UUID] }]
            });

            statusText.innerText = "Connecting to module...";
            const server = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService(HM10_SERVICE_UUID);
            rxTxCharacteristic = await service.getCharacteristic(HM10_CHARACTERISTIC_UUID);

            statusText.innerText = "Connected Successfully!";
            statusText.className = "status connected";
            connectBtn.innerText = "❌ Disconnect";
            connectBtn.setAttribute('onclick', 'disconnectBluetooth()');
            
        } catch (error) {
            console.log(error);
            statusText.innerText = "Connection Failed.";
            statusText.className = "status";
        }
    }

    function disconnectBluetooth() {
        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
            bluetoothDevice.gatt.disconnect();
        }
        const statusText = document.getElementById('statusText');
        const connectBtn = document.getElementById('connectBtn');
        statusText.innerText = "Disconnected";
        statusText.className = "status";
        connectBtn.innerText = "🔌 Connect to HM-10";
        connectBtn.setAttribute('onclick', 'connectBluetooth()');
    }

    async function sendCommand(command) {
        if (!rxTxCharacteristic) {
            alert("Please connect to your HM-10 module first!");
            return;
        }
        // HM-10 parses incoming data streams via standard string reading
        const encoder = new TextEncoder();
        const data = encoder.encode(command + '\n');
        await rxTxCharacteristic.writeValue(data);
    }
</script>

</body>
</html>
