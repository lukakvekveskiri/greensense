<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>
<div class="logo">
                <h1>Green<span>Sense</span></h1>
            </div>
            <div class="bt-status" id="bt-button" onclick="connectBluetooth()">
                <i class="fa-solid fa-bluetooth"></i> <span id="bt-text">Connect HM-10</span>
            </div>
        </header>

        <div class="main-content">
            <div class="status-panel">
                <div class="card">
                    <div class="health-score-circle">
                        <div class="health-inner">
                            <h2 id="health-score">85</h2>
                            <p>Score</p>
                        </div>
                    </div>
                    <h3 id="mode-title">Standard Mode</h3>
                    
                    <div class="camera-container" onclick="startCamera()">
                        <video id="webcam" autoplay playsinline></video>
                        <div class="camera-placeholder" id="placeholder">
                            <i class="fa-solid fa-camera"></i>
                            <span style="font-weight: 600;">AI Plant Scanner</span>
                            <p style="font-size: 12px; color: #708075; margin-top: 5px;">Click to scan plant</p>
                        </div>
                    </div>
                    <div id="ai-result">AI Status: Ready</div>
                </div>
            </div>

            <div class="sensors-grid">
                <div class="sensor-card temp">
                    <div class="icon-wrapper"><i class="fa-solid fa-temperature-high"></i></div>
                    <div class="sensor-info"><p>Air Temp</p><h3 id="val-temp">--.- °C</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card humidity">
                    <div class="icon-wrapper"><i class="fa-solid fa-droplet"></i></div>
                    <div class="sensor-info"><p>Air Humidity</p><h3 id="val-hum">-- %</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card soil">
                    <div class="icon-wrapper"><i class="fa-solid fa-seedling"></i></div>
                    <div class="sensor-info"><p>Soil Moisture</p><h3 id="val-soil">-- %</h3><span class="status-badge">Normal</span></div>
                </div>
                <div class="sensor-card light">
                    <div class="icon-wrapper"><i class="fa-solid fa-sun"></i></div>
                    <div class="sensor-info"><p>Light Level</p><h3 id="val-light">-- Lux</h3><span class="status-badge">Normal</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let model = undefined;
        let bluetoothDevice = null;
        let rxCharacteristic = null;

        // 1. AI მოდელის ლოკალურად ჩატვირთვა ფონურ რეჟიმში
        async function loadAI() {
            document.getElementById('ai-result').innerText = "Loading AI Model...";
            model = await mobilenet.load();
            document.getElementById('ai-result').innerText = "AI Model Ready";
        }
        loadAI();

        // 2. კამერის ჩართვა და გამოსახულების ამოცნობა (ინტერნეტის გარეშე)
        async function startCamera() {
            const video = document.getElementById('webcam');
            const placeholder = document.getElementById('placeholder');
            const resultDiv = document.getElementById('ai-result');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                placeholder.style.display = 'none';
                video.style.display = 'block';
                resultDiv.innerText = "Analyzing plant...";

                // დაველოდოთ 2 წამი სკანირების ეფექტისთვის და მოვახდინოთ იდენტიფიკაცია
                setTimeout(async () => {
                    if (model) {
                        const predictions = await model.classify(video);
                        // ავიღოთ ყველაზე მაღალი ალბათობის მქონე შედეგი
                        const plantName = predictions[0].className.split(',')[0];
                        resultDiv.innerText = `Detected: ${plantName}`;
                        
                        // სიმულაცია: მცენარის მიხედვით რეჟიმის შეცვლა
                        document.getElementById('mode-title').innerText = `${plantName} Mode`;
                        adjustGreenhouseThresholds(plantName);
                    }
                }, 2000);

            } catch (err) {
                console.error("Camera access denied", err);
                resultDiv.innerText = "Error accessing camera.";
            }
        }

        // 3. გარემოს ადაპტაცია ამოცნობილი მცენარის მიხედვით
        function adjustGreenhouseThresholds(plant) {
            document.getElementById('health-score').innerText = "98";
            // აქ შეგიძლიათ შეცვალოთ სასურველი პარამეტრების ლოგიკა კოდში
        }

        // 4. Web Bluetooth კავშირი HM-10 მოდულთან
        async function connectBluetooth() {
            const btButton = document.getElementById('bt-button');
            const btText = document.getElementById('bt-text');

            try {
                btText.innerText = "Searching...";
                // ვეძებთ HM-10 ან ნებისმიერ BLE მოწყობილობას, რომელიც ატარებს Serial პორტის სერვისს
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'HM-' }, { name: 'MLT-BT05' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] // სტანდარტული HM-10 სერვისი
                });

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                rxCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

                // მონაცემების მიღების დაწყება
                await rxCharacteristic.startNotifications();
                rxCharacteristic.addEventListener('characteristicvaluechanged', handleDataReceived);

                btButton.classList.add('connected');
                btText.innerText = "Connected";

            } catch (error) {
                console.error("Bluetooth connection failed", error);
                btText.innerText = "Connect HM-10";
                alert("კავშირი ვერ დამყარდა. დარწმუნდით, რომ ბლუთუზი ჩართულია და იყენებთ Chrome/Edge ბრაუზერს.");
            }
        }

        // 5. Arduino-დან მოსული ტექსტური მონაცემების დამუშავება
        // მოსული მონაცემის ფორმატი უნდა იყოს მაგალითად: T:24.5,H:62,S:48,L:720
        function handleDataReceived(event) {
            const value = new TextDecoder().decode(event.target.value);
            console.log("Received data:", value);

            const parts = value.split(',');
            parts.forEach(part => {
                const kv = part.split(':');
                if(kv[0] === 'T') document.getElementById('val-temp').innerText = `${kv[1]} °C`;
                if(kv[0] === 'H') document.getElementById('val-hum').innerText = `${kv[1]} %`;
                if(kv[0] === 'S') document.getElementById('val-soil').innerText = `${kv[1]} %`;
                if(kv[0] === 'L') document.getElementById('val-light').innerText = `${kv[1]} Lux`;
            });
        }
    </script>
</body>
</html>
